{{ define "main" }}

<!-- Inspirations Landing Page Hero -->
{{ if .Content }}
<section style="background-color: {{ .Params.color }};" class="overflow-hidden">
    <div class="container py-12 md:py-16">
        <p class="text-sm font-semibold text-fjord uppercase tracking-widest mb-4">Inspiration</p>
        <h1 class="mt-0 mb-6 text-3xl md:text-4xl lg:text-5xl font-medium tracking-tight text-balance text-fjord max-w-3xl">
            {{ .Title }}
        </h1>
        <div class="w-12 h-1 bg-primary rounded-full mb-6"></div>
        <div class="prose md:prose-lg lg:prose-xl max-w-3xl prose-p:leading-relaxed">
            {{ .Content }}
        </div>
    </div>
</section>
{{ end }}

<!-- Inspirations Grid -->
<section class="bg-white overflow-hidden">
    <div class="container">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 md:gap-8">
            {{ range $index, $page := .Pages.ByLastmod }}
                {{ .Render "li" }}
            {{ end }}
        </div>
    </div>
</section>

{{ end }}
