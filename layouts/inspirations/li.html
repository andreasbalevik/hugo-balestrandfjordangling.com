<article class="w-full h-full bg-white border border-fjord-pale rounded-lg shadow hover:shadow-md overflow-hidden transition-all duration-300 group focus-within:ring-2 focus-within:ring-primary/40">
    <a href="{{ .RelPermalink }}" class="flex flex-col h-full focus-visible:outline-none" aria-label="Read {{ .Title }}">
        <div>
            {{ range first 1 .Params.images }}
                {{ partial "components/images/image.html" (dict "src" .src "alt" .alt "preset" "card") }}
            {{ end }}
        </div>

        <div class="flex flex-col flex-1 p-5 md:p-6">
            <h2 class="mt-0 mb-4 text-xl md:text-2xl font-medium text-balance text-gray-900 flex-1">
                {{ .Title }}
            </h2>

            {{ with .Params.description }}
            <p class="mt-0 mb-4 text-base text-gray-700 text-pretty leading-relaxed">
                {{ . }}
            </p>
            {{ end }}

            <span class="inline-flex items-center gap-1 font-semibold text-gray-700 group-hover:text-primary transition-colors duration-300">
                Read story
                <svg class="w-4 h-4 transition-transform duration-300 group-hover:translate-x-0.5"
                     aria-hidden="true"
                     xmlns="http://www.w3.org/2000/svg"
                     fill="none"
                     viewBox="0 0 24 24">
                    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 12H5m14 0-4 4m4-4-4-4"/>
                </svg>
            </span>
        </div>
    </a>
</article>
