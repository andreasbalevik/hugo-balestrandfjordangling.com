{{ with index .Params.product_info.prices 0 }}
<div class="absolute top-4 right-4 z-30">
    <div class="bg-[#008000] px-5 py-3 rounded-lg shadow-lg">
        <div class="flex flex-col items-end">
            <span class="text-xs font-semibold text-white/90 uppercase tracking-wider mb-0.5">From</span>
            <span class="text-lg font-bold text-white leading-none">NOK {{ .price }}</span>
        </div>
    </div>
</div>
{{ end }}
