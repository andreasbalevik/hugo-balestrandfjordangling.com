{{ with index .Params.product_info.prices 0 }}
<div class="absolute top-4 right-4 z-30">
    <div class="bg-[#1d3640] px-4 py-2.5 rounded-lg shadow-lg">
        <div class="flex flex-col items-end">
            <span class="text-xs font-semibold text-[#769ba4] uppercase tracking-wider mb-0.5">From</span>
            <span class="text-lg font-bold text-white leading-none">NOK {{ .price }}</span>
        </div>
    </div>
</div>
{{ end }}
