{{/* 
  Primary CTA Button - Orange gradient with arrow animation
  Usage: {{ partial "components/buttons/primary" (dict "href" "/path" "text" "Button Text" "ariaLabel" "Descriptive label") }}
*/}}
<a href="{{ .href }}"
   class="text-lg font-semibold bg-primary hover:bg-primary-dark text-white px-6 py-4 md:px-8 md:py-4 flex md:inline-flex items-center justify-center gap-2 transition-all duration-300 no-underline group shadow hover:shadow-md rounded-lg w-full md:w-auto focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary"
   aria-label="{{ .ariaLabel | default .text }}">
  <span>{{ .text }}</span>
  <svg class="w-5 h-5 transition-transform duration-300 group-hover:translate-x-1" 
       aria-hidden="true"
       xmlns="http://www.w3.org/2000/svg" 
       width="24" 
       height="24" 
       fill="none" 
       viewBox="0 0 24 24">
    <path stroke="currentColor" 
          stroke-linecap="round" 
          stroke-linejoin="round" 
          stroke-width="2" 
          d="M19 12H5m14 0-4 4m4-4-4-4"/>
  </svg>
</a>
