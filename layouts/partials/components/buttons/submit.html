{{/* 
  Submit Form Button - For form submissions with arrow animation
  Usage: {{ partial "components/buttons/submit" (dict "text" "Submit Request") }}
*/}}
<button type="submit"
    class="text-white inline-flex rounded-lg items-center bg-success hover:bg-success/90 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-success font-semibold text-base md:text-lg px-6 md:px-8 py-3 md:py-4 text-center transition-all duration-300 gap-2 group">
    <span>{{ .text | default "Submit" }}</span>
    <svg class="w-4 md:w-5 lg:w-5 h-4 md:h-5 lg:h-5 transition-transform duration-300 group-hover:translate-x-1" 
         aria-hidden="true"
         xmlns="http://www.w3.org/2000/svg" 
         width="24" 
         height="24" 
         fill="none" 
         viewBox="0 0 24 24">
      <path stroke="currentColor" 
            stroke-linecap="round" 
            stroke-linejoin="round" 
            stroke-width="2" 
            d="M19 12H5m14 0-4 4m4-4-4-4"/>
    </svg>
</button>
