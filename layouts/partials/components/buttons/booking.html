{{/* 
  Booking Modal Button - Opens booking modal with arrow animation
  Usage: {{ partial "components/buttons/booking" (dict "text" "Make a request") }}
*/}}
<button data-modal-target="crud-modal"
    class="w-full md:w-auto text-sm md:text-base lg:text-base font-semibold text-white bg-primary hover:bg-primary/90 px-4 md:px-6 lg:px-6 py-2 md:py-2.5 lg:py-2.5 inline-flex items-center justify-center gap-2 cursor-pointer transition-all duration-300 group rounded-lg focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary"
    type="button"
    aria-label="Open booking request form">
    <span>{{ .text | default "Make a request" }}</span>
    <svg class="w-4 md:w-4 lg:w-4 h-4 md:h-4 lg:h-4 transition-transform duration-300 group-hover:translate-x-1" 
         aria-hidden="true"
         xmlns="http://www.w3.org/2000/svg" 
         width="24" 
         height="24" 
         fill="none" 
         viewBox="0 0 24 24">
      <path stroke="currentColor" 
            stroke-linecap="round" 
            stroke-linejoin="round" 
            stroke-width="2" 
            d="M19 12H5m14 0-4 4m4-4-4-4"/>
    </svg>
</button>
