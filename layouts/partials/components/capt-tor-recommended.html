
{{ with .Site.GetPage "index" }}

    {{ with .Params.recommended }}

        <div class="mb-12 text-center md:text-left">
            <p class="text-sm font-semibold text-gray-500 uppercase tracking-widest mb-3">Hand-picked for you</p>
            <h2 class="mt-0 mb-6 text-2xl md:text-3xl lg:text-4xl font-medium tracking-tight text-balance text-gray-900">{{.title}}</h2>
            <div class="w-12 h-1 bg-primary rounded-full md:mx-0 mx-auto"></div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8 justify-items-center">
            {{ range .activities }}
            {{ $page := replace . "/index" "" }}
            {{ with $.Site.GetPage $page }}
            {{ .Render "li" }}
            {{end}}
            {{ end }}

        </div>
    {{ end }}

    <div class="mt-12 mb-6">
        {{ partial "activity/see-all-activities" . }}
    </div>
{{ end }}
