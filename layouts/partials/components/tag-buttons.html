{{/*
  Tag buttons grid — renders all taxonomy tags as colored CTA cards.
  Usage: {{ partial "components/tag-buttons" . }}
*/}}
<div class="grid grid-cols-1 lg:grid-cols-3 gap-6 md:gap-8">
    {{ range $name, $taxonomy := .Site.Taxonomies.tags }}
    {{ with $.Site.GetPage (printf "/tags/%s" $name) }}
    <a href="{{ .RelPermalink }}" aria-label="View {{ .Title }} activities" class="group">
        <div class="relative overflow-hidden text-xl text-white p-6 text-center rounded-lg transition-all duration-300 group-hover:shadow-md group-hover:scale-[1.02] shadow border border-black/5"
            style="background-color: {{ .Params.color | default "#1d3640" }};">
            <div class="absolute inset-0 bg-gradient-to-br from-white/15 to-transparent pointer-events-none" aria-hidden="true"></div>
            <div class="inline-flex items-center gap-2 relative">
                <span>{{ .Title }}</span>
                <svg class="w-5 h-5 transition-transform duration-300 group-hover:translate-x-1"
                     aria-hidden="true"
                     xmlns="http://www.w3.org/2000/svg"
                     width="24"
                     height="24"
                     fill="none"
                     viewBox="0 0 24 24">
                    <path stroke="currentColor"
                          stroke-linecap="round"
                          stroke-linejoin="round"
                          stroke-width="2"
                          d="M19 12H5m14 0-4 4m4-4-4-4"/>
                </svg>
            </div>
        </div>
    </a>
    {{ end }}
    {{ end }}
</div>
