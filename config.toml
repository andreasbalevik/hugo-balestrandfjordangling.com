enableGitInfo = true

title = 'Balestrand Fjord Angling'
theme = 'balevikit-tailwindcss-hugo-theme'
timeout = 90
baseURL = 'https://balestrandfjordangling.com'

[imaging]
  anchor = 'Smart'
  hint = 'photo'
  quality = 85
  resampleFilter = 'MitchellNetravali'

[Params]
  logo = "/favicon/android-chrome-512x512.png"
  logo_title = "Balestrand Fjord Angling" 
  brand_image = "/favicon/android-chrome-512x512.png"
  ogimage = ""
  keywords = ['Balestrand fjord angling', 'Balestrand', 'Norway', 'Fishing', 'Sightseeing', 'Guide', 'Angling']
  email = "contact@balestrandfjordangling.com"
  phone = "+47 900 81 939"
  address = "Holmen 3, 6899 Balestrand, Norway"
  contrast = 2

  # Address details (used by json-ld schemas)
  addressLocality = "Balestrand"
  addressRegion = "Vestland"
  postalCode = "6899"
  addressCountry = "NO"

  # Geo coordinates (used by json-ld schemas)
  latitude = "61.2069"
  longitude = "6.5278"
  areaServedRadius = "50000"

  # Business details
  priceRange = "NOK 3000-10000"
  hasMap = "https://www.google.com/maps/place/Holmen+3,+6899+Balestrand,+Norway"
  founder = "Captain Tor Balevik"
  author = "Captain Tor"
  author_url = "https://balestrandfjordangling.com/about/"
  currency = "NOK"
  privacyUrl = "/privacy"

[Params.social]
  youtube     = "https://www.youtube.com/@balestrandfjordangling"
  instagram   = "https://www.instagram.com/balestrandfjordangling/"
  facebook    = "https://www.facebook.com/Balestrand-Fjord-Angling-112650423742403"
  tripadvisor = "https://no.tripadvisor.com/Attraction_Review-g616211-d12520219-Reviews-Balestrand_Fjord_Angling-Balestrand_Sogn_og_Fjordane_Western_Norway.html"

  # Content sections (used by json-ld schemas)
  blog_section = "inspirations"
  product_section = "activities"

[[menus.footer]]
  name   = "Home"
  url    = "/"
  weight = 10

[taxonomies]
  tag = 'tags'

[build]
  [build.buildStats]
    enable = true
  [[build.cachebusters]]
    source = 'hugo_stats\.json'
    target = 'css'
  [[build.cachebusters]]
    source = '(postcss|tailwind)\.config\.js'
    target = 'css'
  [[build.cachebusters]]
    source = 'layouts/.*'
    target = 'css'

[outputFormats.TXT]
  mediaType = "text/plain"
  isPlainText = true

[outputs]
  home = ["HTML", "JSON", "TXT"]
